worker_processes auto;
pid /run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile   on;
    tcp_nopush on;

    log_format cf '$http_cf_connecting_ip - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log cf;
    error_log  /var/log/nginx/error.log warn;

    ssl_protocols TLSv1.2 TLSv1.3;

    upstream php {
        server php:9000;
    }

    # Home
    server {
        listen 80;
        listen 443 ssl;
        http2 on;
        server_name neoarchlinux.org;

        ssl_certificate     /etc/nginx/ssl/cf-origin.pem;
        ssl_certificate_key /etc/nginx/ssl/cf-origin.key;

        root /var/www/html;

        include error.nginx.conf;

        location ~ /\.(?!well-known/) {
            deny all;
        }

        location / {
            try_files /public$uri @router;
        }

        location @router {
            if (-f $document_root/routes/home$uri/index.php) {
                rewrite ^ /routes/home$uri/index.php last;
            }

            if ($uri ~ index$) {
                return 404;
            }

            if (-f $document_root/routes/home$uri.php) {
                rewrite ^ /routes/home$uri.php last;
            }

            return 404;
        }

        location ~ \.php$ {
            try_files $fastcgi_script_name =404;

            include fastcgi_params;
            fastcgi_pass php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

            fastcgi_intercept_errors on;
        }
    }

    # Docs
    server {
        listen 80;
        listen 443 ssl;
        http2 on;
        server_name docs.neoarchlinux.org;

        ssl_certificate     /etc/nginx/ssl/cf-origin.pem;
        ssl_certificate_key /etc/nginx/ssl/cf-origin.key;

        root /var/www/html;

        include error.nginx.conf;

        location ~ /\.(?!well-known/) {
            deny all;
        }

        location / {
            try_files /public$uri /assets/docs$uri @router;
        }

        location @router {
            if (-f $document_root/routes/docs$uri/index.md) {
                rewrite ^ /routes/docs/router.php?path=$uri last;
            }

            if ($uri ~ index$) {
                return 404;
            }

            if (-f $document_root/routes/docs$uri.md) {
                rewrite ^ /routes/docs/router.php?path=$uri last;
            }

            return 404;
        }

        location ~ \.php$ {
            try_files $fastcgi_script_name =404;

            include fastcgi_params;
            fastcgi_pass php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

            fastcgi_intercept_errors on;
        }
    }

    # Iso
    server {
        listen 80;
        listen 443 ssl;
        http2 on;
        server_name iso.neoarchlinux.org;

        ssl_certificate     /etc/nginx/ssl/cf-origin.pem;
        ssl_certificate_key /etc/nginx/ssl/cf-origin.key;

        root /var/www/html;

        include error.nginx.conf;

        location ~ /\.(?!well-known/) {
            deny all;
        }

        location / {
            try_files /public$uri @router;
        }

        location @router {
            if (-f $document_root/routes/iso$uri/index.php) {
                rewrite ^ /routes/iso/$uri/index.php last;
            }

            if ($uri ~ index$) {
                return 404;
            }

            if (-f $document_root/routes/iso$uri.php) {
                rewrite ^ /routes/iso$uri.php last;
            }

            return 404;
        }

        location ~ \.php$ {
            try_files $fastcgi_script_name =404;

            include fastcgi_params;
            fastcgi_pass php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

            fastcgi_intercept_errors on;
        }

        location /build {
            if ($request_method !~ ^POST$) {
                return 405;
            }

            rewrite ^ /routes/iso/build.php last;
        }

        location /ws {
            if ($http_upgrade != "websocket") {
                return 400;
            }

            proxy_pass http://iso-builder:4150;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_read_timeout 3600;
        }

        location /download/ {
            if ($uri !~ "^/download/[A-Za-z0-9-]+/[A-Za-z0-9._-]+\.iso$") {
                return 400;
            }

            alias /app/isos-out/;

            add_header Content-Disposition 'attachment';

            sendfile on;
            aio threads;
        }
    }

    # Packages
    server {
        listen 80;
        listen 443 ssl;
        http2 on;
        server_name packages.neoarchlinux.org;

        ssl_certificate     /etc/nginx/ssl/cf-origin.pem;
        ssl_certificate_key /etc/nginx/ssl/cf-origin.key;

        root /var/www/html;

        include error.nginx.conf;

        location / {
            try_files /public$uri @package_router;
        }

        location @package_router {
            include fastcgi_params;
            fastcgi_pass php;

            fastcgi_param SCRIPT_FILENAME /var/www/src/packages/doc.php;

            set $component_name $uri;
            if ($component_name ~ ^/(.+)$) {
                set $component_name $1;
            }
            fastcgi_param QUERY_STRING component_name=$component_name;

            fastcgi_intercept_errors on;
            recursive_error_pages on;

            error_page 404 = @router;
        }

        location @router {
            if (-f $document_root/routes/packages$uri/index.php) {
                rewrite ^ /routes/packages$uri/index.php last;
            }

            if ($uri ~ index$) {
                return 404;
            }

            if (-f $document_root/routes/packages$uri.php) {
                rewrite ^ /routes/packages$uri.php last;
            }

            return 404;
        }

        location ~ /\.(?!well-known/) {
            deny all;
        }

        location ~ \.php$ {
            try_files $fastcgi_script_name =404;

            include fastcgi_params;
            fastcgi_pass php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

            fastcgi_intercept_errors on;
        }
    }

    # Mirrors
    server {
        listen 80;
        listen 443 ssl;
        http2 on;
        server_name mirrors.neoarchlinux.org;

        ssl_certificate     /etc/nginx/ssl/cf-origin.pem;
        ssl_certificate_key /etc/nginx/ssl/cf-origin.key;

        root /var/mirrors;
        
        include error.nginx.conf;

        location ~ /\.(?!well-known/) {
            deny all;
        }

        location / {
            add_header Accept-Ranges bytes;
        
            if (-f /var/www/html/public$uri) {
                root /var/www/html/public;
            }

            try_files $uri @dirindex;
        }

        location @dirindex {
            if (!-d /var/mirrors$request_uri) {
                return 404;
            }

            include fastcgi_params;
            fastcgi_pass php;
            fastcgi_param SCRIPT_FILENAME /var/www/src/mirrors/directory_index.php;
            fastcgi_param QUERY_STRING uri=$request_uri;

            fastcgi_intercept_errors on;
        }

        location = /neoarch/upload {
            include fastcgi_params;
            fastcgi_pass php;
            fastcgi_param SCRIPT_FILENAME /var/www/src/mirrors/neoarch/upload.php;


            fastcgi_intercept_errors on;
        }
    }
}
